basePath: /
definitions:
  domain.Item:
    properties:
      addedByUserId:
        description: The user ID of the person who added this item
        example: user-123
        type: string
      description:
        description: The item's description or name
        example: Whole Milk 1L
        type: string
      ean:
        description: The European Article Number barcode
        example: "1234567890123"
        type: string
      listId:
        description: The identifier of the list this item belongs to
        example: list-456
        type: string
      quantity:
        description: The quantity of the item
        example: 2
        type: integer
      sku:
        description: The Stock Keeping Unit identifier
        example: SKU-1001
        type: string
    type: object
  domain.List:
    properties:
      addedByUserId:
        description: The user ID of the person who last added an item
        example: user-123
        type: string
      createdAt:
        description: Timestamp when the list was created
        example: "2026-07-16T12:00:00Z"
        type: string
      deletedAt:
        description: Timestamp when the list was deleted, if any
        type: string
      id:
        description: The unique list identifier
        example: list-456
        type: string
      image:
        description: Optional image URL for the list
        example: https://example.com/images/list.jpg
        type: string
      isSharable:
        description: Flag indicating if other users can access/join this list
        example: true
        type: boolean
      items:
        description: The list of items belonging to this shopping list
        items:
          $ref: '#/definitions/domain.Item'
        type: array
      lastPurchaseDate:
        description: Timestamp of the last purchase operation
        example: "2026-07-16T12:05:00Z"
        type: string
      listType:
        description: 'The accessibility type of the list. Allowed values: PRIVATE,
          PUBLIC.'
        example: PRIVATE
        type: string
      ownerId:
        description: The owner's user ID
        example: user-123
        type: string
      title:
        description: The title/name of the shopping list
        example: Weekly Groceries
        type: string
      updatedAt:
        description: Timestamp of the last update to the list
        example: "2026-07-16T12:05:00Z"
        type: string
      vendorAssociated:
        description: Optional associated vendor
        example: Supermarket
        type: string
    type: object
  http.addItemRequest:
    properties:
      addedByUserId:
        description: The user ID who added this item
        example: user-123
        type: string
      description:
        description: The descriptive name of the item
        example: Whole Milk 1L
        type: string
      ean:
        description: The European Article Number barcode
        example: "1234567890123"
        type: string
      quantity:
        description: The quantity of the item
        example: 2
        type: integer
      sku:
        description: The Stock Keeping Unit of the item
        example: SKU-1001
        type: string
    type: object
  http.createListRequest:
    properties:
      image:
        description: Optional image URL for the list
        example: https://example.com/images/list.jpg
        type: string
      isSharable:
        description: Flag indicating if other users can join this list
        example: true
        type: boolean
      listType:
        description: The accessibility type of the list (PRIVATE or PUBLIC)
        example: PRIVATE
        type: string
      ownerId:
        description: The owner's user ID
        example: user-123
        type: string
      title:
        description: The title of the collaborative list
        example: Weekly Groceries
        type: string
      vendorAssociated:
        description: Optional associated vendor
        example: Supermarket
        type: string
    type: object
  http.errorDetails:
    properties:
      code:
        description: Programmatic error code for client error handling
        example: INVALID_REQUEST_PAYLOAD
        type: string
      message:
        description: Human-readable message explaining the failure details
        example: invalid request body
        type: string
    type: object
  http.errorEnvelope:
    properties:
      error:
        allOf:
        - $ref: '#/definitions/http.errorDetails'
        description: The core error details wrapper
    type: object
host: localhost:8080
info:
  contact: {}
  description: Collaborative Shopping and Order List Builder prototype with Go Chi,
    Hexagonal Architecture and in-memory thread-safe DB.
  title: List-Builder Prototype REST API
  version: "1.0"
paths:
  /api/v1/lists:
    post:
      consumes:
      - application/json
      description: Create a new shared or private shopping list.
      parameters:
      - description: List creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/http.createListRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.List'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Create a shopping/order list
      tags:
      - lists
  /api/v1/lists/{id}:
    delete:
      parameters:
      - description: List ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Delete list
      tags:
      - lists
  /api/v1/lists/{id}/{userId}:
    get:
      description: Retrieves list metadata and all items by list ID, checking privacy
        permissions.
      parameters:
      - description: List ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID trying to access
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.List'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Get list by ID
      tags:
      - lists
  /api/v1/lists/{id}/items:
    post:
      consumes:
      - application/json
      description: Appends a new item with description and positive quantity to an
        existing list.
      parameters:
      - description: List ID
        in: path
        name: id
        required: true
        type: string
      - description: Item fields payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/http.addItemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Item'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Add item to list
      tags:
      - items
  /api/v1/lists/{id}/items/{itemId}:
    delete:
      parameters:
      - description: List ID
        in: path
        name: id
        required: true
        type: string
      - description: Item SKU ID
        in: path
        name: itemId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Delete item
      tags:
      - items
  /api/v1/lists/{id}/items/{itemId}/toggle:
    patch:
      description: Soft-deletes/removes an item from list if present, or restores
        it if it was previously soft-deleted.
      parameters:
      - description: List ID
        in: path
        name: id
        required: true
        type: string
      - description: Item SKU ID
        in: path
        name: itemId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Toggle item inclusion
      tags:
      - items
  /api/v1/lists/{userId}:
    get:
      description: Retrieves all lists where the specified user is the owner, or lists
        that are PUBLIC/sharable.
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.List'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorEnvelope'
      summary: Get lists for user
      tags:
      - lists
  /health:
    get:
      description: check server status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
swagger: "2.0"
